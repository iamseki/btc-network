[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
  # Current desktop shell transitively depends on the Linux GTK3/WebKit stack through
  # Tauri/WRY on Linux. These crates are flagged as unmaintained upstream with no safe
  # replacement available within the current Tauri 2 dependency graph.
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2024-0370",
  # Current Tauri transitive dependencies also pull in archived utility crates through
  # tauri-utils. Keep these explicit until upstream replaces them.
  "RUSTSEC-2025-0057",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
  # The preserved legacy ClickHouse adapter still pulls in the official ClickHouse Rust client,
  # which currently depends on `paste` transitively through `polonius-the-crab` and
  # `higher-kinded-types`. We do not depend on `paste` directly. Revisit this ignore when the
  # legacy adapter is removed or the upstream clickhouse dependency graph changes.
  "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
