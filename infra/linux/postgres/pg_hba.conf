# Explicit private-access authentication baseline for the first hosted deployment.

local   all           postgres               peer
local   btc_network   btc_network_app        scram-sha-256
local   btc_network   btc_network_crawler    scram-sha-256
local   btc_network   btc_network_migrate    scram-sha-256

host    btc_network   btc_network_app        127.0.0.1/32    scram-sha-256
host    btc_network   btc_network_crawler    127.0.0.1/32    scram-sha-256
host    btc_network   btc_network_migrate    127.0.0.1/32    scram-sha-256

# Add narrow private API/crawler host CIDRs during deployment, for example:
# host  btc_network  btc_network_app      <api-host-private-ip>/32  scram-sha-256
# host  btc_network  btc_network_crawler  <api-host-private-ip>/32  scram-sha-256
# host  btc_network  btc_network_migrate  <api-host-private-ip>/32  scram-sha-256
#
# Do not add public or broad subnet-wide access.
