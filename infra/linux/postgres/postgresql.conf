# Explicit PostgreSQL 18 baseline for the first hosted deployment.
# Adapt the file location for the distro and PostgreSQL major version.
#
# This file is intentionally conservative for the split-host topology:
# - private-network PostgreSQL access only
# - explicit PostgreSQL 18 async-I/O settings
# - bounded connection count
# - slower, smoother checkpoint cadence instead of very frequent checkpoints

# Replace this with the database host private address during deployment, or keep
# localhost-only for restore drills that do not accept API/crawler connections.
listen_addresses = '127.0.0.1'
port = 5432
unix_socket_directories = '/var/run/postgresql'

# Connection budget:
# The API and crawler currently use modest pools. Keep headroom for migration,
# operator, and maintenance sessions instead of leaving the default at 100.
max_connections = 64
superuser_reserved_connections = 3

# Shared memory and buffers:
# PostgreSQL docs recommend shared_buffers around 25% of RAM on a dedicated DB
# host. Keep a conservative first baseline and raise it only with measured
# evidence from the actual instance family and EBS volume.
shared_memory_type = mmap
huge_pages = try
shared_buffers = 256MB
effective_cache_size = 1GB
min_dynamic_shared_memory = 64MB
maintenance_work_mem = 128MB
work_mem = 4MB

# PostgreSQL 18 async I/O:
# Keep the portable worker-based AIO path as the baseline.
# Switch to io_uring only after confirming the PostgreSQL build has liburing
# support and the kernel/runtime behavior is validated in production-like tests.
io_method = worker
io_workers = 4
effective_io_concurrency = 32
maintenance_io_concurrency = 32

# Uncomment only after validating build + kernel support:
# io_method = io_uring

# WAL and checkpointing:
# Fewer checkpoints come mainly from raising checkpoint_timeout and max_wal_size.
# Keep checkpoint_completion_target high so checkpoint I/O stays spread out.
wal_level = replica
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = 20min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 512kB
bgwriter_flush_after = 512kB
backend_flush_after = 256kB

logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 0
log_line_prefix = '%m [%p] %q%u@%d '
log_min_duration_statement = 250ms
log_checkpoints = on

password_encryption = scram-sha-256
