limit_req_zone $binary_remote_addr zone=btc_network_api_rate:10m rate=30r/s;

upstream btc_network_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name api.btcnetwork.info;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.btcnetwork.info;

    # Provide the real certificate paths for your host before enabling the site.
    ssl_certificate /etc/ssl/certs/api.btcnetwork.info/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/api.btcnetwork.info/privkey.pem;

    include /etc/nginx/conf.d/btc-network/cloudflare-realip.conf;

    access_log /var/log/nginx/btc-network-api.access.log;
    error_log /var/log/nginx/btc-network-api.error.log warn;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        limit_req zone=btc_network_api_rate burst=60 nodelay;

        proxy_pass http://btc_network_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

