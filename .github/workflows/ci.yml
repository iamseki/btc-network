name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Detect source changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'

      - name: Build
        run: cargo build --bins --locked

      - name: Test
        if: steps.changes.outputs.src == 'true'
        run: cargo test --locked

  dependency-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Rust security tools
        run: cargo install --locked cargo-audit cargo-deny

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Rust dependency security checks
        run: make security-rust

      - name: Frontend dependency security checks
        run: make security-web
