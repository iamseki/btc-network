name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_HOME: ${{ github.workspace }}/.cargo-home
  RUST_TOOLCHAIN: 1.93.1

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|test|ci|build)(\([A-Za-z0-9._/-]+\))?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error title=Invalid PR title::Pull request titles must match '<type>(<scope>): <summary>' or '<type>: <summary>'."
            echo "Allowed types: feat, fix, docs, chore, refactor, test, ci, build."
            echo "Example: docs(BNDD-0005): add implementation plan"
            exit 1
          fi

  web-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      web_changed: ${{ steps.filter.outputs.web }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect web changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal

      - name: Cache Cargo build inputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            target
          key: ${{ runner.os }}-cargo-build-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-build-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build
        run: cargo build --workspace --bins --locked

      - name: Test
        run: make test

  dependency-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal

      - name: Cache Rust security tooling
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/bin
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            ${{ env.CARGO_HOME }}/.crates2.json
            ${{ env.CARGO_HOME }}/.crates.toml
          key: ${{ runner.os }}-cargo-security-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-security-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-security-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Add cached Cargo bin to PATH
        run: echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"

      - name: Install Rust security tools
        run: cargo install --locked cargo-audit cargo-deny

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Rust dependency security checks
        run: make security-rust

      - name: Frontend dependency security checks
        run: make security-web

  deploy-web:
    runs-on: ubuntu-latest
    needs:
      - web-changes
      - build-and-test
      - dependency-security
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.web-changes.outputs.web_changed == 'true'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Build web app
        env:
          VITE_SUPPORT_URL: ${{ vars.VITE_SUPPORT_URL }}
        run: npm run build --prefix apps/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy apps/web/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=main
