services:
  postgres-migrate:
    image: btc-network-crawler-local:dev
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
      target: runtime
    container_name: btc-network-postgres-migrate
    profiles: ["crawler", "api"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BTC_NETWORK_POSTGRES_URL: postgresql://btc_network_dev:btc_network_dev@postgres:5432/btc_network
      BTC_NETWORK_POSTGRES_MAX_CONNECTIONS: 5
    entrypoint: ["/usr/local/bin/btc-network-postgres-migrate"]
    restart: "no"
