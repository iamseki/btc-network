services:
  crawler-status:
    image: btc-network-crawler-local:dev
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
      target: runtime
    container_name: btc-network-crawler-status
    profiles: ["status"]
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      BTC_NETWORK_POSTGRES_URL: postgresql://btc_network_dev:btc_network_dev@postgres:5432/btc_network
      BTC_NETWORK_POSTGRES_MAX_CONNECTIONS: ${BTC_NETWORK_POSTGRES_MAX_CONNECTIONS:-5}
      BTC_NETWORK_STATUS_CONFIG: ${BTC_NETWORK_STATUS_CONFIG:-/config/status-targets.toml}
      BTC_NETWORK_STATUS_CHECK_ATTEMPTS: ${BTC_NETWORK_STATUS_CHECK_ATTEMPTS:-5}
      BTC_NETWORK_STATUS_CONNECT_TIMEOUT_SECS: ${BTC_NETWORK_STATUS_CONNECT_TIMEOUT_SECS:-10}
      BTC_NETWORK_STATUS_IO_TIMEOUT_SECS: ${BTC_NETWORK_STATUS_IO_TIMEOUT_SECS:-10}
      BTC_NETWORK_STATUS_RETRY_BACKOFF_MS: ${BTC_NETWORK_STATUS_RETRY_BACKOFF_MS:-250}
      BTC_NETWORK_STATUS_RETENTION_DAYS: ${BTC_NETWORK_STATUS_RETENTION_DAYS:-30}
    command: ["status-check"]
    restart: "no"
    volumes:
      - ./config:/config:ro

  crawler:
    image: btc-network-crawler-local:dev
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
      target: runtime
    container_name: btc-network-crawler
    profiles: ["crawler"]
    cpus: ${BTC_NETWORK_CRAWLER_CPUS:-2.0}
    mem_limit: ${BTC_NETWORK_CRAWLER_MEM_LIMIT:-6g}
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
      tor:
        condition: service_healthy
    environment:
      BTC_NETWORK_POSTGRES_URL: postgresql://btc_network_dev:btc_network_dev@postgres:5432/btc_network
      BTC_NETWORK_POSTGRES_MAX_CONNECTIONS: ${BTC_NETWORK_POSTGRES_MAX_CONNECTIONS:-16}
      BTC_NETWORK_CRAWLER_TOR_SOCKS5_ADDR: ${BTC_NETWORK_CRAWLER_TOR_SOCKS5_ADDR:-tor:9050}
      BTC_NETWORK_CRAWLER_MAX_CONCURRENCY: ${BTC_NETWORK_CRAWLER_MAX_CONCURRENCY:-10000}
      BTC_NETWORK_CRAWLER_MAX_IN_FLIGHT_CONNECTS: ${BTC_NETWORK_CRAWLER_MAX_IN_FLIGHT_CONNECTS:-512}
      BTC_NETWORK_CRAWLER_MAX_TRACKED_NODES: ${BTC_NETWORK_CRAWLER_MAX_TRACKED_NODES:-500000}
      BTC_NETWORK_CRAWLER_MAX_RUNTIME_MINUTES: ${BTC_NETWORK_CRAWLER_MAX_RUNTIME_MINUTES:-120}
      BTC_NETWORK_CRAWLER_IDLE_TIMEOUT_MINUTES: ${BTC_NETWORK_CRAWLER_IDLE_TIMEOUT_MINUTES:-5}
      BTC_NETWORK_CRAWLER_CHECKPOINT_INTERVAL_SECS: ${BTC_NETWORK_CRAWLER_CHECKPOINT_INTERVAL_SECS:-30}
      BTC_NETWORK_CRAWLER_CONNECT_TIMEOUT_SECS: ${BTC_NETWORK_CRAWLER_CONNECT_TIMEOUT_SECS:-30}
      BTC_NETWORK_CRAWLER_CONNECT_MAX_ATTEMPTS: ${BTC_NETWORK_CRAWLER_CONNECT_MAX_ATTEMPTS:-5}
      BTC_NETWORK_CRAWLER_UNREACHABLE_LOOKBACK_DAYS: ${BTC_NETWORK_CRAWLER_UNREACHABLE_LOOKBACK_DAYS:-7}
      BTC_NETWORK_CRAWLER_CONNECT_RETRY_BACKOFF_MS: ${BTC_NETWORK_CRAWLER_CONNECT_RETRY_BACKOFF_MS:-250}
      BTC_NETWORK_CRAWLER_IO_TIMEOUT_SECS: ${BTC_NETWORK_CRAWLER_IO_TIMEOUT_SECS:-20}
      BTC_NETWORK_CRAWLER_SHUTDOWN_GRACE_PERIOD_SECS: ${BTC_NETWORK_CRAWLER_SHUTDOWN_GRACE_PERIOD_SECS:-15}
      BTC_NETWORK_CRAWLER_VERBOSE: ${BTC_NETWORK_CRAWLER_VERBOSE:-false}
      BTC_NETWORK_MMDB_ASN_PATH: ${BTC_NETWORK_MMDB_ASN_PATH:-/data/mmdb/GeoLite2-ASN.mmdb}
      BTC_NETWORK_MMDB_COUNTRY_PATH: ${BTC_NETWORK_MMDB_COUNTRY_PATH:-/data/mmdb/GeoLite2-Country.mmdb}
    volumes:
      - ./.dev-data/mmdb:/data/mmdb:ro
    ulimits:
      nofile:
        soft: ${BTC_NETWORK_CRAWLER_NOFILE_SOFT:-1024}
        hard: ${BTC_NETWORK_CRAWLER_NOFILE_HARD:-1024}
