services:
  api:
    image: btc-network-api-local:dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    container_name: btc-network-api
    profiles: ["api"]
    cpus: ${BTC_NETWORK_API_CPUS:-2.0}
    mem_limit: ${BTC_NETWORK_API_MEM_LIMIT:-2g}
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      BTC_NETWORK_API_BIND_ADDR: 0.0.0.0:8080
      BTC_NETWORK_POSTGRES_URL: postgresql://btc_network_dev:btc_network_dev@postgres:5432/btc_network
      BTC_NETWORK_POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "8080:8080"
    restart: unless-stopped
