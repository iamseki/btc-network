services:
  postgres:
    image: postgres:18.3
    container_name: btc-network-postgres
    restart: unless-stopped
    cpus: 2.0
    mem_limit: 8g
    environment:
      POSTGRES_DB: btc_network
      POSTGRES_USER: btc_network_dev
      POSTGRES_PASSWORD: btc_network_dev
      PGDATA: /var/lib/postgresql/18/btc-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btc_network_dev -d btc_network"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./.dev-data/postgres:/var/lib/postgresql
