<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">btc-network desktop icon</title>
  <desc id="desc">Retro black and gold Bitcoin-inspired icon for the desktop shell.</desc>

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd45a" />
      <stop offset="55%" stop-color="#f5b301" />
      <stop offset="100%" stop-color="#b87b00" />
    </linearGradient>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent" />
      <rect y="0" width="8" height="1" fill="#f5b301" fill-opacity="0.08" />
      <rect y="4" width="8" height="1" fill="#f5b301" fill-opacity="0.05" />
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="40" fill="#0a0a0a" />
  <rect
    x="28"
    y="28"
    width="456"
    height="456"
    rx="40"
    fill="url(#scanlines)"
  />
  <rect
    x="28"
    y="28"
    width="456"
    height="456"
    rx="40"
    fill="none"
    stroke="#f5b301"
    stroke-width="16"
  />
  <rect
    x="52"
    y="52"
    width="408"
    height="408"
    rx="22"
    fill="none"
    stroke="#f5b301"
    stroke-opacity="0.18"
    stroke-width="4"
    stroke-dasharray="12 10"
  />

  <circle
    cx="256"
    cy="256"
    r="124"
    fill="#111111"
    stroke="url(#gold)"
    stroke-width="16"
    filter="url(#glow)"
  />

  <path
    d="M226 158h54c42 0 68 18 68 50 0 21-11 35-29 43 24 7 39 24 39 50 0 40-31 61-83 61h-49"
    fill="none"
    stroke="url(#gold)"
    stroke-width="26"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <path
    d="M208 138v236M250 138v236"
    fill="none"
    stroke="url(#gold)"
    stroke-width="12"
    stroke-linecap="square"
  />

  <path
    d="M132 256h48M332 256h48M256 132v48M256 332v48"
    fill="none"
    stroke="#f5b301"
    stroke-opacity="0.5"
    stroke-width="10"
    stroke-linecap="square"
  />
</svg>
